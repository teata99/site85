<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>San San Project - List</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

<div id="topbar"></div>

<div class="d-flex">
  <div id="sidebar"></div>

  <main class="flex-grow-1 p-4">
    <div class="container bg-white shadow-sm rounded p-4" style="max-width: 800px;">
      
      <div class="mb-4">
        <h2 class="fw-bold text-dark">
          <i class="bi bi-pencil-square text-success"></i> 게시글 수정
        </h2>
        <p class="text-muted">기존 내용을 수정하여 다시 게시합니다.</p>
      </div>

      <hr>

      <form id="editForm">
        <div class="mb-3">
          <label for="title" class="form-label fw-bold">제목</label>
          <input type="text" class="form-control form-control-lg" id="title" placeholder="제목을 입력하세요" required>
        </div>

        <div class="mb-4">
          <label for="content" class="form-label fw-bold">내용</label>
          <textarea class="form-control" id="content" rows="10" placeholder="내용을 상세히 입력하세요" required></textarea>
        </div>

        <div class="d-flex gap-2 justify-content-end">
          <button type="button" class="btn btn-outline-secondary px-4" onclick="history.back()">취소</button>
          <button type="button" id="submitBtn" class="btn btn-success px-4" onclick="updatePost()">
            <span id="btnText">수정 완료</span>
            <span id="btnLoader" class="spinner-border spinner-border-sm d-none" role="status"></span>
          </button>
        </div>
      </form>

    </div>
  </main>
</div>      

<script>
fetch("/topbar.html")
  .then(res => res.text())
  .then(html => {
    document.getElementById("topbar").innerHTML = html;
  });

fetch("/sidebar.html")
  .then(res => res.text())
  .then(html => {
    const sidebar = document.getElementById("sidebar");
    sidebar.innerHTML = html;

    document.querySelectorAll('.nav-link').forEach(link => {
      if (link.getAttribute("href") === location.pathname.split('/').pop()) {
        link.classList.add('active');
      }
    });
  });
</script>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const issueNumber = urlParams.get('id');

  async function loadPostData() {
    const userInfo = localStorage.getItem('user_info');

    if (!userInfo) {
        alert("로그인이 필요합니다.");
        location.href = "/board/list.html";
        return;
    }

    const loginUser = JSON.parse(userInfo).login;

    if (!issueNumber) {
        alert("수정할 글 번호가 없습니다.");
        location.href = "/board/list.html";
        return;
    }

    try {
      const response = await fetch(`https://api.github.com/repos/teata99/site85/issues/${issueNumber}`);
      if (!response.ok) throw new Error("글을 불러올 수 없습니다.");

      const post = await response.json();

      if (post.user.login !== loginUser) {
            alert("본인의 글만 수정할 수 있습니다.");
            location.href = "/board/list.html";
            return;
      }

      document.getElementById('title').value = post.title;
      document.getElementById('content').value = post.body;

    } catch (error) {
      console.error(error);
      alert("데이터를 가져오는 중 오류가 발생했습니다.");
    }
  }

  async function updatePost() {
    const title = document.getElementById('title').value;
    const content = document.getElementById('content').value;
    const btn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');

    if (!title.trim() || !content.trim()) {
      alert("제목과 내용을 모두 입력해주세요.");
      return;
    }

    btn.disabled = true;
    btnText.innerText = "수정 중...";
    btnLoader.classList.remove('d-none');

    try {
      const response = await fetch('https://site85.vercel.app/api/update-post', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
            issueNumber: issueNumber, 
            title: title, 
            content: content 
        })
      });

      if (response.ok) {
        alert("수정 되었습니다.\n반영되는 데 시간이 걸릴수 있습니다.\n반영이 안된 경우 새로고침을 눌러주세요.");
        location.href = `/board/view.html?id=${issueNumber}`; // 수정한 글로 돌아가기
      } else {
        const result = await response.json();
        alert("수정 실패: " + (result.message || "오류 발생"));
      }
    } catch (error) {
      console.error(error);
      alert("서버 통신 에러");

    } finally {
      btn.disabled = false;
      btnText.innerText = "수정 완료";
      btnLoader.classList.add('d-none');
    }
  }

  window.onload = loadPostData;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
