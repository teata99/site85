<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>San San Project - List</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

<div id="topbar"></div>

<div class="d-flex">
  <div id="sidebar"></div>

  <main class="flex-grow-1 p-4">
    <div class="container bg-white shadow-sm rounded p-4">  
        <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">
          <i class="bi bi-list-ul text-primary"></i> 게시판 리스트
        </h2>
        <a href="/board/write.html" class="btn btn-primary">
          <i class="bi bi-pencil"></i> 글쓰기
        </a>
      </div>

    <div class="table-responsive">
        <table class="table table-hover">
          <thead class="table-light">
            <tr>
              <th style="width: 10%">번호</th>
              <th style="width: 50%">제목</th>
              <th style="width: 20%">작성자</th>
              <th style="width: 20%">날짜</th>
            </tr>
          </thead>
          <tbody id="post-list">
            <tr>
              <td colspan="4" class="text-center py-5 text-secondary">
                <div class="spinner-border spinner-border-sm" role="status"></div>
                게시글을 불러오는 중입니다...
              </td>
            </tr>
          </tbody>
        </table>

        <nav class="d-flex justify-content-center mt-4">
            <ul class="pagination">
            <li class="page-item" id="prev-btn">
                <button class="page-link" onclick="changePage(currentPage - 1)">이전</button>
            </li>
            <li class="page-item disabled">
                <span class="page-link text-dark fw-bold" id="current-page-num">1</span>
            </li>
            <li class="page-item" id="next-btn">
                <button class="page-link" onclick="changePage(currentPage + 1)">다음</button>
            </li>
            </ul>
        </nav>
      
      </div>

    </div>
  </main>
</div>


<script>
fetch("/topbar.html")
  .then(res => res.text())
  .then(html => {
    document.getElementById("topbar").innerHTML = html;
  });

fetch("/sidebar.html")
  .then(res => res.text())
  .then(html => {
    const sidebar = document.getElementById("sidebar");
    sidebar.innerHTML = html;

    document.querySelectorAll('.nav-link').forEach(link => {
      if (link.getAttribute("href") === location.pathname.split('/').pop()) {
        link.classList.add('active');
      }
    });
  });
</script>

<script>
  let currentPage = 1;
  const perPage = 10; 

  async function loadPosts(page) {
    try {
      const response = await fetch(`https://api.github.com/repos/teata99/site82/issues?per_page=${perPage}&page=${page}`);
      const posts = await response.json();

      const listElement = document.getElementById('post-list');
      
      if (posts.length === 0) {
        listElement.innerHTML = `<tr><td colspan="4" class="text-center py-5">게시글이 없습니다.</td></tr>`;
        document.getElementById('next-btn').classList.add('disabled');
        return;
      }

      // 날짜 포맷팅 함수
      const formatDate = (dateStr) => {
        const date = new Date(dateStr);
        return date.toLocaleDateString();
      };

      listElement.innerHTML = posts.map((post, index) => `
        <tr>
          <td>${post.number}</td>
          <td>
            <a href="/board/view.html?id=${post.number}" class="text-decoration-none text-dark fw-semibold">
              ${post.title}
              ${post.comments > 0 ? `<span class="badge rounded-pill bg-light text-primary border border-primary ms-1">${post.comments}</span>` : ''}
            </a>
          </td>
          <td>
            <img src="${post.user.avatar_url}" width="20" height="20" class="rounded-circle me-1">
            ${post.user.login}
          </td>
          <td class="text-secondary">${formatDate(post.created_at)}</td>
        </tr>
      `).join('');

      currentPage = page;
      document.getElementById('current-page-num').innerText = currentPage;

      document.getElementById('prev-btn').classList.toggle('disabled', currentPage === 1);

      document.getElementById('next-btn').classList.toggle('disabled', posts.length < perPage);


    } catch (error) {
      console.error("데이터 로드 실패:", error);
      document.getElementById('post-list').innerHTML = `<tr><td colspan="4" class="text-center text-danger py-5">데이터를 불러오지 못했습니다.</td></tr>`;
    }
  }

  function changePage(newPage) {
    if (newPage < 1) return;
    loadPosts(newPage);
    window.scrollTo(0, 0); // 페이지 이동 시 맨 위로 스크롤
  }  

  // 페이지 로드 시 바로 실행
  window.onload = () => loadPosts(1);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
