<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>San San Project - List</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">

  <style>
    /* 마크다운 본문 영역 기본 여백 설정 */
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      padding: 15px;
    }
    @media (max-width: 767px) { .markdown-body { padding: 15px; } }
  </style>

</head>

<body class="bg-light">

<div id="topbar"></div>

<div class="d-flex">
  <div id="sidebar"></div>

  <main class="flex-grow-1 p-4">
    <div class="container bg-white shadow-sm rounded p-4" style="max-width: 900px;">

      <div id="view-header" class="mb-4">
        <h2 id="post-title" class="fw-bold mb-2 text-dark">로딩 중...</h2>
        <div class="text-secondary">
          <span id="post-author" class="me-3"><i class="bi bi-person"></i> </span>
          <span id="post-date"><i class="bi bi-calendar-event"></i> </span>
        </div>
      </div>
      <hr>

      <div id="post-content" class="markdown-body">
        내용을 불러오고 있습니다...
      </div>
      <hr>

      <div class="d-flex justify-content-between">
        <a href="/board/list.html" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left"></i> 목록으로
        </a>
        <div>
          <button class="btn btn-outline-danger" onclick="deletePost()">삭제</button>
        </div>
      </div>

    </div>
  </main>
</div>      

<script>
fetch("/topbar.html")
  .then(res => res.text())
  .then(html => {
    document.getElementById("topbar").innerHTML = html;
  });

fetch("/sidebar.html")
  .then(res => res.text())
  .then(html => {
    const sidebar = document.getElementById("sidebar");
    sidebar.innerHTML = html;

    document.querySelectorAll('.nav-link').forEach(link => {
      if (link.getAttribute("href") === location.pathname.split('/').pop()) {
        link.classList.add('active');
      }
    });
  });
</script>  

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const issueNumber = urlParams.get('id');

  async function loadDetail() {
    if (!issueNumber) {
        alert("잘못된 접근입니다.");
        location.href = "/board/list.html";
        return;
    }

    try {
      // 2. 해당 번호의 이슈 데이터만 가져오기
      const response = await fetch(`https://api.github.com/repos/teata99/site82/issues/${issueNumber}`);
      const post = await response.json();

      if (!response.ok) throw new Error("글을 찾을 수 없습니다.");

      document.getElementById('post-title').innerText = post.title;
      document.getElementById('post-author').innerHTML += post.user.login;
      document.getElementById('post-date').innerHTML += new Date(post.created_at).toLocaleString();
      document.getElementById('post-content').innerText = marked.parse(post.body || "");

    } catch(error) {
        console.error(error);
        document.getElementById('post-content').innerText = "데이터를 불러오는 데 실패했습니다.";
    }
  }

  function deletePost() {
    
  }

  window.onload = loadDetail;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
